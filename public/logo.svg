  <!-- Wordmark: single text, tspan keeps .ai flush -->
  <text x="122" y="64" font-family="'Outfit', 'DM Sans', 'Segoe UI', sans-serif" font-size="36" letter-spacing="-0.5">
    <tspan font-weight="700" fill="#1e3a8a">latentmesh</tspan><tspan font-weight="400" fill="#2563eb">.ai</tspan>
  </text>

</svg>