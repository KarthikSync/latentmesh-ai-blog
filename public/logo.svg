<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 100" width="480" height="100">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&amp;display=swap');
    </style>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f4f9"/>
    </radialGradient>
    <radialGradient id="coreGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </radialGradient>
    <radialGradient id="midGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </radialGradient>
    <radialGradient id="outerGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </radialGradient>
    <radialGradient id="accentGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </radialGradient>
    <filter id="nodeShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#1e3a8a" flood-opacity="0.22"/>
    </filter>
    <clipPath id="iconClip">
      <circle cx="50" cy="50" r="40"/>
    </clipPath>
  </defs>

  <rect width="480" height="100" rx="14" fill="#ffffff"/>

  <!-- Icon bg -->
  <circle cx="50" cy="50" r="41" fill="url(#bgGrad)"/>

  <g clip-path="url(#iconClip)">
    <g stroke="#1e3a8a" stroke-width="0.5" opacity="0.04">
      <line x1="20" y1="10" x2="20" y2="90"/><line x1="35" y1="10" x2="35" y2="90"/>
      <line x1="50" y1="10" x2="50" y2="90"/><line x1="65" y1="10" x2="65" y2="90"/>
      <line x1="80" y1="10" x2="80" y2="90"/>
      <line x1="10" y1="25" x2="90" y2="25"/><line x1="10" y1="40" x2="90" y2="40"/>
      <line x1="10" y1="50" x2="90" y2="50"/><line x1="10" y1="60" x2="90" y2="60"/>
      <line x1="10" y1="75" x2="90" y2="75"/>
    </g>
    <g stroke="#bfdbfe" stroke-width="0.8" stroke-linecap="round">
      <line x1="50" y1="12" x2="69" y2="21"/><line x1="50" y1="12" x2="31" y2="21"/>
      <line x1="69" y1="21" x2="84" y2="36"/><line x1="31" y1="21" x2="16" y2="36"/>
      <line x1="84" y1="36" x2="89" y2="54"/><line x1="16" y1="36" x2="11" y2="54"/>
      <line x1="89" y1="54" x2="81" y2="73"/><line x1="11" y1="54" x2="19" y2="73"/>
      <line x1="81" y1="73" x2="65" y2="85"/><line x1="19" y1="73" x2="35" y2="85"/>
      <line x1="65" y1="85" x2="50" y2="89"/><line x1="35" y1="85" x2="50" y2="89"/>
    </g>
    <g stroke="#93c5fd" stroke-width="1" stroke-linecap="round">
      <line x1="50" y1="22" x2="69" y2="21"/><line x1="50" y1="22" x2="31" y2="21"/>
      <line x1="50" y1="22" x2="50" y2="12"/>
      <line x1="78" y1="36" x2="84" y2="36"/><line x1="78" y1="36" x2="89" y2="54"/>
      <line x1="22" y1="36" x2="16" y2="36"/><line x1="22" y1="36" x2="11" y2="54"/>
      <line x1="80" y1="68" x2="89" y2="54"/><line x1="80" y1="68" x2="81" y2="73"/>
      <line x1="20" y1="68" x2="11" y2="54"/><line x1="20" y1="68" x2="19" y2="73"/>
      <line x1="63" y1="83" x2="65" y2="85"/><line x1="37" y1="83" x2="35" y2="85"/>
    </g>
    <g stroke="#3b82f6" stroke-width="1.4" stroke-linecap="round" opacity="0.8">
      <line x1="50" y1="50" x2="50" y2="22"/><line x1="50" y1="50" x2="78" y2="36"/>
      <line x1="50" y1="50" x2="80" y2="68"/><line x1="50" y1="50" x2="63" y2="83"/>
      <line x1="50" y1="50" x2="37" y2="83"/><line x1="50" y1="50" x2="20" y2="68"/>
      <line x1="50" y1="50" x2="22" y2="36"/>
    </g>
    <g stroke="#2563eb" stroke-width="1.1" stroke-linecap="round" opacity="0.5">
      <line x1="50" y1="22" x2="78" y2="36"/><line x1="78" y1="36" x2="80" y2="68"/>
      <line x1="80" y1="68" x2="63" y2="83"/><line x1="63" y1="83" x2="37" y2="83"/>
      <line x1="37" y1="83" x2="20" y2="68"/><line x1="20" y1="68" x2="22" y2="36"/>
      <line x1="22" y1="36" x2="50" y2="22"/>
    </g>
    <g filter="url(#nodeShadow)">
      <circle cx="50" cy="12" r="2.8" fill="url(#outerGrad)" stroke="white" stroke-width="1.2"/>
      <circle cx="69" cy="21" r="2.5" fill="url(#outerGrad)" stroke="white" stroke-width="1.2"/>
      <circle cx="31" cy="21" r="2.5" fill="url(#outerGrad)" stroke="white" stroke-width="1.2"/>
      <circle cx="84" cy="36" r="2.5" fill="url(#outerGrad)" stroke="white" stroke-width="1.2"/>
      <circle cx="16" cy="36" r="2.5" fill="url(#outerGrad)" stroke="white" stroke-width="1.2"/>
      <circle cx="89" cy="54" r="2.5" fill="url(#outerGrad)" stroke="white" stroke-width="1.2"/>
      <circle cx="11" cy="54" r="2.5" fill="url(#outerGrad)" stroke="white" stroke-width="1.2"/>
      <circle cx="81" cy="73" r="2.5" fill="url(#outerGrad)" stroke="white" stroke-width="1.2"/>
      <circle cx="19" cy="73" r="2.5" fill="url(#outerGrad)" stroke="white" stroke-width="1.2"/>
      <circle cx="65" cy="85" r="2.5" fill="url(#outerGrad)" stroke="white" stroke-width="1.2"/>
      <circle cx="35" cy="85" r="2.5" fill="url(#outerGrad)" stroke="white" stroke-width="1.2"/>
      <circle cx="50" cy="89" r="2.3" fill="url(#outerGrad)" stroke="white" stroke-width="1.2"/>
    </g>
    <g filter="url(#nodeShadow)">
      <circle cx="50" cy="22" r="4" fill="url(#midGrad)" stroke="white" stroke-width="1.8"/>
      <circle cx="78" cy="36" r="4" fill="url(#midGrad)" stroke="white" stroke-width="1.8"/>
      <circle cx="80" cy="68" r="4" fill="url(#midGrad)" stroke="white" stroke-width="1.8"/>
      <circle cx="63" cy="83" r="4" fill="url(#midGrad)" stroke="white" stroke-width="1.8"/>
      <circle cx="37" cy="83" r="4" fill="url(#midGrad)" stroke="white" stroke-width="1.8"/>
      <circle cx="20" cy="68" r="4" fill="url(#midGrad)" stroke="white" stroke-width="1.8"/>
      <circle cx="22" cy="36" r="4" fill="url(#midGrad)" stroke="white" stroke-width="1.8"/>
    </g>
    <circle cx="50" cy="50" r="8.5" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
    <circle cx="50" cy="50" r="5.8" fill="url(#coreGrad)" stroke="white" stroke-width="1.8" filter="url(#nodeShadow)"/>
    <circle cx="50" cy="50" r="2" fill="url(#accentGrad)" stroke="white" stroke-width="1"/>
