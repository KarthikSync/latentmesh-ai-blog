<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <style>
      .title { font-size: 16px; font-weight: 600; fill: #1a1a1a; }
      .subtitle { font-size: 11px; fill: #666; }
      .pattern-title { font-size: 12px; font-weight: 600; fill: #1a1a1a; }
      .pattern-desc { font-size: 10px; fill: #555; }
      .time-label { font-size: 11px; fill: #999; font-weight: 500; }
      .arrow-text { font-size: 10px; fill: #999; }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ccc"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" class="title">Detection Timing: Structural Signals Arrive Before Outcome Signals</text>
  <text x="450" y="48" text-anchor="middle" class="subtitle">The gap between structural detection and outcome detection is where teams either catch drift or get caught by it.</text>

  <!-- Time arrow -->
  <line x1="60" y1="80" x2="840" y2="80" stroke="#ddd" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="60" y="72" class="time-label">Hours</text>
  <text x="350" y="72" class="time-label">Days</text>
  <text x="650" y="72" class="time-label">Weeks</text>

  <!-- Pattern 1: Canary Replay - earliest -->
  <rect x="60" y="100" width="280" height="60" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="72" y="120" class="pattern-title">Canary Replay</text>
  <text x="72" y="136" class="pattern-desc">Fixed inputs, versioned rubric. Any output change</text>
  <text x="72" y="148" class="pattern-desc">is attributable to the system, not the traffic.</text>
  <circle cx="80" cy="170" r="3" fill="#2563eb"/>
  <text x="88" y="174" font-size="9" fill="#2563eb">Catches: model updates, prompt regressions, retrieval collapse</text>

  <!-- Pattern 2: Trace Assertions - early -->
  <rect x="140" y="190" width="320" height="60" rx="6" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1.5"/>
  <text x="152" y="210" class="pattern-title">Production Trace Scoring + Control Assertions</text>
  <text x="152" y="226" class="pattern-desc">Assert invariants on intermediate steps. Score path structure,</text>
  <text x="152" y="238" class="pattern-desc">not just final answer. Control verification on every request.</text>
  <circle cx="160" cy="260" r="3" fill="#7c3aed"/>
  <text x="168" y="264" font-size="9" fill="#7c3aed">Catches: skipped controls, wrong tools, missing authorization</text>

  <!-- Pattern 3: Structural Signals - medium -->
  <rect x="300" y="280" width="320" height="60" rx="6" fill="#fefce8" stroke="#fde68a" stroke-width="1.5"/>
  <text x="312" y="300" class="pattern-title">Structural Signal Monitoring</text>
  <text x="312" y="316" class="pattern-desc">Tool-selection rates, route distributions, retrieval source</text>
  <text x="312" y="328" class="pattern-desc">entropy, step-count shifts. Slice by version and segment.</text>
  <circle cx="320" cy="350" r="3" fill="#ca8a04"/>
  <text x="328" y="354" font-size="9" fill="#ca8a04">Catches: planner drift, traffic mix shifts, fallback path overuse</text>

  <!-- Pattern 4: Outcome + Human Review - latest -->
  <rect x="540" y="100" width="300" height="60" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="552" y="120" class="pattern-title">Outcome Monitoring + Targeted Human Review</text>
  <text x="552" y="136" class="pattern-desc">CSAT, task completion, escalation rates, cost per</text>
  <text x="552" y="148" class="pattern-desc">resolution. Human review where uncertainty is rising.</text>
  <circle cx="560" cy="170" r="3" fill="#059669"/>
  <text x="568" y="174" font-size="9" fill="#059669">Catches: confirms structural signals, recalibrates evaluators</text>

  <!-- Connecting annotations -->
  <line x1="340" y1="160" x2="540" y2="125" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="460" y1="250" x2="540" y2="145" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Bottom annotation -->
  <rect x="200" y="375" width="500" height="24" rx="4" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="450" y="391" text-anchor="middle" font-size="11" fill="#991b1b" font-weight="500">Most teams only have outcome monitoring. The gap is where drift compounds.</text>
</svg>
