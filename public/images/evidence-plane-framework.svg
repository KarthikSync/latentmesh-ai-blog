<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 840" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" fill="#64748b">
      <polygon points="0 0, 10 3.5, 0 7" />
    </marker>
    <marker id="arrow-dark" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" fill="#1e293b">
      <polygon points="0 0, 10 3.5, 0 7" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1600" height="840" fill="#fafaf9" />

  <!-- Three horizontal lanes -->
  <!-- Control Plane lane -->
  <rect x="60" y="40" width="1480" height="160" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" />
  <text x="100" y="80" font-size="13" font-weight="600" fill="#94a3b8" letter-spacing="1.5">CONTROL PLANE</text>
  <text x="100" y="102" font-size="12" fill="#94a3b8">Policy enforcement, routing, runtime guards</text>

  <!-- Evidence Plane lane (emphasized) -->
  <rect x="60" y="220" width="1480" height="380" rx="8" fill="#ffffff" stroke="#1e293b" stroke-width="2" />
  <text x="100" y="264" font-size="14" font-weight="700" fill="#1e293b" letter-spacing="1.5">EVIDENCE PLANE</text>
  <text x="100" y="286" font-size="12" fill="#64748b">Produces, stores, and serves proof that the system operates within declared obligations</text>

  <!-- Audit / Regulatory Surface lane -->
  <rect x="60" y="620" width="1480" height="180" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" />
  <text x="100" y="660" font-size="13" font-weight="600" fill="#94a3b8" letter-spacing="1.5">AUDIT &amp; REGULATORY SURFACE</text>
  <text x="100" y="682" font-size="12" fill="#94a3b8">Regulators, auditors, incident reviewers consume evidence artifacts</text>

  <!-- === Five objects inside the Evidence Plane === -->

  <!-- 1. Obligation -->
  <rect x="140" y="330" width="200" height="100" rx="6" fill="#1e293b" />
  <text x="240" y="370" font-size="15" font-weight="600" fill="#ffffff" text-anchor="middle">Obligation</text>
  <text x="240" y="392" font-size="11" fill="#94a3b8" text-anchor="middle">What must be true</text>
  <text x="240" y="408" font-size="11" fill="#94a3b8" text-anchor="middle">(regulatory, contractual, policy)</text>

  <!-- 2. Control -->
  <rect x="420" y="330" width="200" height="100" rx="6" fill="#334155" />
  <text x="520" y="370" font-size="15" font-weight="600" fill="#ffffff" text-anchor="middle">Control</text>
  <text x="520" y="392" font-size="11" fill="#94a3b8" text-anchor="middle">What you build to</text>
  <text x="520" y="408" font-size="11" fill="#94a3b8" text-anchor="middle">enforce the obligation</text>

  <!-- 3. Evaluation -->
  <rect x="700" y="330" width="200" height="100" rx="6" fill="#334155" />
  <text x="800" y="370" font-size="15" font-weight="600" fill="#ffffff" text-anchor="middle">Evaluation</text>
  <text x="800" y="392" font-size="11" fill="#94a3b8" text-anchor="middle">How you test whether</text>
  <text x="800" y="408" font-size="11" fill="#94a3b8" text-anchor="middle">the control holds</text>

  <!-- 4. Evidence Artifact -->
  <rect x="980" y="330" width="200" height="100" rx="6" fill="#334155" />
  <text x="1080" y="370" font-size="15" font-weight="600" fill="#ffffff" text-anchor="middle">Evidence Artifact</text>
  <text x="1080" y="392" font-size="11" fill="#94a3b8" text-anchor="middle">The stored, retrievable</text>
  <text x="1080" y="408" font-size="11" fill="#94a3b8" text-anchor="middle">proof of what happened</text>

  <!-- 5. Response -->
  <rect x="1260" y="330" width="200" height="100" rx="6" fill="#1e293b" />
  <text x="1360" y="370" font-size="15" font-weight="600" fill="#ffffff" text-anchor="middle">Response</text>
  <text x="1360" y="392" font-size="11" fill="#94a3b8" text-anchor="middle">What changes when</text>
  <text x="1360" y="408" font-size="11" fill="#94a3b8" text-anchor="middle">the evidence says it should</text>

  <!-- Forward arrows between the five objects -->
  <line x1="340" y1="380" x2="416" y2="380" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="620" y1="380" x2="696" y2="380" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="900" y1="380" x2="976" y2="380" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="1180" y1="380" x2="1256" y2="380" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Response loops back to Obligation (curved arrow underneath) -->
  <path d="M 1360 430 L 1360 530 Q 1360 555 1335 555 L 265 555 Q 240 555 240 530 L 240 430"
        fill="none" stroke="#1e293b" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow-dark)" />
  <text x="800" y="572" font-size="11" font-weight="500" fill="#1e293b" text-anchor="middle">Response feeds back: update obligation, tighten control, re-evaluate</text>

  <!-- === Vertical connectors to Control Plane === -->
  <!-- Control plane feeds into Obligation and Control -->
  <line x1="240" y1="200" x2="240" y2="326" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,4" marker-end="url(#arrow)" />
  <line x1="520" y1="200" x2="520" y2="326" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,4" marker-end="url(#arrow)" />

  <!-- Labels on vertical connectors -->
  <text x="248" y="268" font-size="10" fill="#94a3b8">declares</text>
  <text x="528" y="268" font-size="10" fill="#94a3b8">enforces at runtime</text>

  <!-- === Vertical connectors to Audit Surface === -->
  <!-- Evidence Artifact feeds down to audit surface -->
  <line x1="1080" y1="434" x2="1080" y2="616" stroke="#1e293b" stroke-width="2" marker-end="url(#arrow-dark)" />
  <text x="1088" y="528" font-size="11" font-weight="500" fill="#1e293b">serves proof</text>

  <!-- Response also connects to audit surface -->
  <line x1="1360" y1="434" x2="1360" y2="616" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,4" marker-end="url(#arrow)" />
  <text x="1368" y="528" font-size="10" fill="#94a3b8">logs action taken</text>

  <!-- === Regulatory labels in audit surface === -->
  <rect x="140" y="710" width="160" height="50" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" />
  <text x="220" y="740" font-size="12" font-weight="500" fill="#475569" text-anchor="middle">EU AI Act</text>

  <rect x="340" y="710" width="160" height="50" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" />
  <text x="420" y="740" font-size="12" font-weight="500" fill="#475569" text-anchor="middle">NIST AI RMF</text>

  <rect x="540" y="710" width="160" height="50" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" />
  <text x="620" y="740" font-size="12" font-weight="500" fill="#475569" text-anchor="middle">ISO 42001</text>

  <rect x="740" y="710" width="160" height="50" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" />
  <text x="820" y="740" font-size="12" font-weight="500" fill="#475569" text-anchor="middle">Internal audit</text>

  <rect x="940" y="710" width="160" height="50" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" />
  <text x="1020" y="740" font-size="12" font-weight="500" fill="#475569" text-anchor="middle">Incident review</text>

  <!-- Title -->
  <text x="800" y="828" font-size="11" fill="#94a3b8" text-anchor="middle">The Evidence Plane for AI Systems — latentmesh.ai</text>
</svg>