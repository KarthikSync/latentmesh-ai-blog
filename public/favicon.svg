<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Clean white background -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f4f9"/>
    </radialGradient>

    <!-- Primary node gradient: deep navy to royal blue -->
    <radialGradient id="coreGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </radialGradient>

    <!-- Mid node gradient -->
    <radialGradient id="midGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </radialGradient>

    <!-- Outer node gradient -->
    <radialGradient id="outerGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </radialGradient>

    <!-- Accent gold node -->
    <radialGradient id="accentGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </radialGradient>

    <!-- Soft shadow -->
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#1e3a8a" flood-opacity="0.12"/>
    </filter>

    <!-- Node crisp shadow -->
    <filter id="nodeShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1e3a8a" flood-opacity="0.25"/>
    </filter>

    <clipPath id="circleClip">
      <circle cx="200" cy="200" r="172"/>
    </clipPath>
  </defs>

  <!-- Card shadow -->
  <circle cx="200" cy="204" r="180" fill="#1e3a8a" opacity="0.10" filter="url(#cardShadow)"/>

  <!-- White background circle -->
  <circle cx="200" cy="200" r="180" fill="url(#bgGrad)"/>

  <!-- Subtle grid texture -->
  <g clip-path="url(#circleClip)" opacity="0.04">
    <line x1="80" y1="30" x2="80" y2="370" stroke="#1e3a8a" stroke-width="1"/>
    <line x1="120" y1="30" x2="120" y2="370" stroke="#1e3a8a" stroke-width="1"/>
    <line x1="160" y1="30" x2="160" y2="370" stroke="#1e3a8a" stroke-width="1"/>
    <line x1="200" y1="30" x2="200" y2="370" stroke="#1e3a8a" stroke-width="1"/>
    <line x1="240" y1="30" x2="240" y2="370" stroke="#1e3a8a" stroke-width="1"/>
    <line x1="280" y1="30" x2="280" y2="370" stroke="#1e3a8a" stroke-width="1"/>
    <line x1="320" y1="30" x2="320" y2="370" stroke="#1e3a8a" stroke-width="1"/>
    <line x1="30" y1="80" x2="370" y2="80" stroke="#1e3a8a" stroke-width="1"/>
    <line x1="30" y1="120" x2="370" y2="120" stroke="#1e3a8a" stroke-width="1"/>
    <line x1="30" y1="160" x2="370" y2="160" stroke="#1e3a8a" stroke-width="1"/>
    <line x1="30" y1="200" x2="370" y2="200" stroke="#1e3a8a" stroke-width="1"/>
    <line x1="30" y1="240" x2="370" y2="240" stroke="#1e3a8a" stroke-width="1"/>
    <line x1="30" y1="280" x2="370" y2="280" stroke="#1e3a8a" stroke-width="1"/>
    <line x1="30" y1="320" x2="370" y2="320" stroke="#1e3a8a" stroke-width="1"/>
  </g>

  <g clip-path="url(#circleClip)">

    <!-- === MESH EDGES: clean slate-blue lines === -->

    <!-- Outer dim edges -->
    <g stroke="#bfdbfe" stroke-width="1.2" stroke-linecap="round">
      <line x1="200" y1="55" x2="275" y2="93"/>
      <line x1="200" y1="55" x2="125" y2="93"/>
      <line x1="275" y1="93" x2="338" y2="148"/>
      <line x1="125" y1="93" x2="62" y2="148"/>
      <line x1="338" y1="148" x2="352" y2="220"/>
      <line x1="62" y1="148" x2="48" y2="220"/>
      <line x1="352" y1="220" x2="320" y2="300"/>
      <line x1="48" y1="220" x2="80" y2="300"/>
      <line x1="320" y1="300" x2="252" y2="352"/>
      <line x1="80" y1="300" x2="148" y2="352"/>
      <line x1="252" y1="352" x2="200" y2="362"/>
      <line x1="148" y1="352" x2="200" y2="362"/>
    </g>

    <!-- Mid-ring to outer connectors -->
    <g stroke="#93c5fd" stroke-width="1.4" stroke-linecap="round">
      <line x1="200" y1="95" x2="275" y2="93"/>
      <line x1="200" y1="95" x2="125" y2="93"/>
      <line x1="200" y1="95" x2="200" y2="55"/>
      <line x1="302" y1="148" x2="338" y2="148"/>
      <line x1="302" y1="148" x2="352" y2="220"/>
      <line x1="98" y1="148" x2="62" y2="148"/>
      <line x1="98" y1="148" x2="48" y2="220"/>
      <line x1="314" y1="268" x2="352" y2="220"/>
      <line x1="314" y1="268" x2="320" y2="300"/>
      <line x1="86" y1="268" x2="48" y2="220"/>
      <line x1="86" y1="268" x2="80" y2="300"/>
      <line x1="245" y1="335" x2="252" y2="352"/>
      <line x1="155" y1="335" x2="148" y2="352"/>
    </g>

    <!-- Inner spokes: strong navy-blue -->
    <g stroke="#3b82f6" stroke-width="2" stroke-linecap="round" opacity="0.8">
      <line x1="200" y1="200" x2="200" y2="95"/>
      <line x1="200" y1="200" x2="302" y2="148"/>
      <line x1="200" y1="200" x2="314" y2="268"/>
      <line x1="200" y1="200" x2="245" y2="335"/>
      <line x1="200" y1="200" x2="155" y2="335"/>
      <line x1="200" y1="200" x2="86" y2="268"/>
      <line x1="200" y1="200" x2="98" y2="148"/>
    </g>

    <!-- Inner ring connections -->
    <g stroke="#2563eb" stroke-width="1.8" stroke-linecap="round" opacity="0.55">
      <line x1="200" y1="95" x2="302" y2="148"/>
      <line x1="302" y1="148" x2="314" y2="268"/>
      <line x1="314" y1="268" x2="245" y2="335"/>
      <line x1="245" y1="335" x2="155" y2="335"/>
      <line x1="155" y1="335" x2="86" y2="268"/>
      <line x1="86" y1="268" x2="98" y2="148"/>
      <line x1="98" y1="148" x2="200" y2="95"/>
    </g>

    <!-- === NODES === -->

    <!-- Outer ring: pale blue -->
    <g filter="url(#nodeShadow)">
      <circle cx="200" cy="55" r="6" fill="url(#outerGrad)" stroke="white" stroke-width="2"/>
      <circle cx="275" cy="93" r="5.5" fill="url(#outerGrad)" stroke="white" stroke-width="2"/>
      <circle cx="125" cy="93" r="5.5" fill="url(#outerGrad)" stroke="white" stroke-width="2"/>
      <circle cx="338" cy="148" r="5.5" fill="url(#outerGrad)" stroke="white" stroke-width="2"/>
      <circle cx="62" cy="148" r="5.5" fill="url(#outerGrad)" stroke="white" stroke-width="2"/>
      <circle cx="352" cy="220" r="5.5" fill="url(#outerGrad)" stroke="white" stroke-width="2"/>
      <circle cx="48" cy="220" r="5.5" fill="url(#outerGrad)" stroke="white" stroke-width="2"/>
      <circle cx="320" cy="300" r="5.5" fill="url(#outerGrad)" stroke="white" stroke-width="2"/>
      <circle cx="80" cy="300" r="5.5" fill="url(#outerGrad)" stroke="white" stroke-width="2"/>
      <circle cx="252" cy="352" r="5.5" fill="url(#outerGrad)" stroke="white" stroke-width="2"/>
      <circle cx="148" cy="352" r="5.5" fill="url(#outerGrad)" stroke="white" stroke-width="2"/>
      <circle cx="200" cy="362" r="5" fill="url(#outerGrad)" stroke="white" stroke-width="2"/>
    </g>

    <!-- Mid ring: royal blue -->
    <g filter="url(#nodeShadow)">
      <circle cx="200" cy="95" r="8" fill="url(#midGrad)" stroke="white" stroke-width="2.5"/>
      <circle cx="302" cy="148" r="8" fill="url(#midGrad)" stroke="white" stroke-width="2.5"/>
      <circle cx="314" cy="268" r="8" fill="url(#midGrad)" stroke="white" stroke-width="2.5"/>
      <circle cx="245" cy="335" r="8" fill="url(#midGrad)" stroke="white" stroke-width="2.5"/>
      <circle cx="155" cy="335" r="8" fill="url(#midGrad)" stroke="white" stroke-width="2.5"/>
      <circle cx="86" cy="268" r="8" fill="url(#midGrad)" stroke="white" stroke-width="2.5"/>
      <circle cx="98" cy="148" r="8" fill="url(#midGrad)" stroke="white" stroke-width="2.5"/>
    </g>

    <!-- Core center node: deep navy + gold accent ring -->
    <circle cx="200" cy="200" r="32" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
    <circle cx="200" cy="200" r="22" fill="url(#coreGrad)" stroke="white" stroke-width="3" filter="url(#nodeShadow)"/>
    <!-- Gold accent dot -->
    <circle cx="200" cy="200" r="7" fill="url(#accentGrad)" stroke="white" stroke-width="2"/>

  </g>

  <!-- Outer border ring: double line enterprise feel -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="#dbeafe" stroke-width="2"/>
  <circle cx="200" cy="200" r="174" fill="none" stroke="#93c5fd" stroke-width="1" opacity="0.6"/>
</svg>